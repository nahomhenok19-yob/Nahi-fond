<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
}

/* CHAT BOX */
#chat{
    height:80vh;
    overflow-y:scroll;
    padding:10px;
}

/* INPUT */
input,button{
    padding:10px;
}

button{
    background:red;
    border:none;
    color:black;
}
</style>
</head>

<body>

<h2>🔥 NAHI FOND LIVE CHAT</h2>

<input id="username" placeholder="Your name">
<button onclick="connect()">Connect</button>

<div id="chat"></div>

<input id="to" placeholder="Send to user">
<input id="msg" placeholder="message">
<button onclick="send()">Send</button>

<br><br>

<!-- CALL BUTTONS -->
<button onclick="startCall('video')">🎥 Video Call</button>
<button onclick="startCall('voice')">🎤 Voice Call</button>

<script>
const socket = io();

let user = "";

/* CONNECT USER */
function connect(){
    user = document.getElementById("username").value;

    socket.emit("connect_user", {
        username:user
    });
}

/* SEND MESSAGE */
function send(){
    socket.emit("private_message",{
        from:user,
        to:document.getElementById("to").value,
        message:document.getElementById("msg").value
    });
}

/* RECEIVE MESSAGE */
socket.on("new_message",(data)=>{
    document.getElementById("chat").innerHTML +=
    `<p><b>${data.from}:</b> ${data.message}</p>`;
});

/* CALL SIGNAL */
function startCall(type){
    let to = document.getElementById("to").value;

    socket.emit("call_signal",{
        from:user,
        to:to,
        type:type
    });

    alert(type + " call started...");
}
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
}

/* CHAT BOX */
#chatBox{
    position:fixed;
    bottom:0;
    right:10px;
    width:300px;
    height:400px;
    background:#111;
    border:1px solid red;
    display:none;
    flex-direction:column;
}

/* HEADER */
#header{
    background:red;
    color:black;
    padding:10px;
    font-weight:bold;
}

/* MESSAGES */
#messages{
    flex:1;
    overflow-y:scroll;
    padding:10px;
}

/* INPUT */
input{
    width:70%;
    padding:8px;
    background:black;
    border:1px solid red;
    color:white;
}

button{
    width:30%;
    background:red;
    border:none;
    padding:8px;
}

/* POPUP NOTIFICATION */
.popup{
    position:fixed;
    top:20px;
    right:20px;
    background:red;
    color:black;
    padding:10px;
    border-radius:8px;
    display:none;
    animation:slide 0.5s ease;
}

@keyframes slide{
    from{transform:translateX(200px);}
    to{transform:translateX(0);}
}

/* OPEN BUTTON */
#openBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:red;
    color:black;
    padding:15px;
    border-radius:50%;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="popup" class="popup"></div>

<div id="chatBox">

    <div id="header">NAHI FOND CHAT</div>

    <div id="messages"></div>

    <div style="display:flex;">
        <input id="to" placeholder="user">
        <input id="msg" placeholder="message">
        <button onclick="send()">Send</button>
    </div>

</div>

<div id="openBtn" onclick="toggleChat()">💬</div>

<script>
const socket = io();

let user = prompt("Enter username");
socket.emit("join",{user});

/* OPEN CHAT */
function toggleChat(){
    let box = document.getElementById("chatBox");
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

/* SEND MESSAGE */
function send(){
    let to = document.getElementById("to").value;
    let msg = document.getElementById("msg").value;

    socket.emit("message",{
        from:user,
        to:to,
        message:msg
    });

    // AI auto reply trigger
    socket.emit("ai_reply",{message:msg});
}

/* RECEIVE MESSAGE */
socket.on("private_message",(data)=>{
    let div = document.getElementById("messages");
    div.innerHTML += `<p><b>${data.from}:</b> ${data.message}</p>`;

    showPopup(data.from + ": " + data.message);
});

/* POPUP SYSTEM */
function showPopup(text){
    let popup = document.getElementById("popup");
    popup.innerText = text;
    popup.style.display = "block";

    setTimeout(()=>{
        popup.style.display = "none";
    },3000);
}
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
}

#box{
    width:100%;
    height:90vh;
    overflow-y:scroll;
    padding:10px;
}

.msg{
    margin:10px;
}

.user{ color:red; }
.ai{ color:white; }

input{
    width:80%;
    padding:10px;
    background:black;
    border:1px solid red;
    color:white;
}

button{
    width:18%;
    padding:10px;
    background:red;
    border:none;
}
</style>
</head>

<body>

<h3>🔥 NAHI FOND AI CHAT</h3>

<div id="box"></div>

<div style="display:flex;">
    <input id="msg" placeholder="Ask AI...">
    <button onclick="send()">Send</button>
</div>

<script>
let user = prompt("Enter username");

function addMsg(text, type){
    document.getElementById("box").innerHTML +=
    `<div class="msg ${type}">${text}</div>`;
}

async function send(){

    let msg = document.getElementById("msg").value;

    addMsg("You: " + msg, "user");

    let res = await fetch("/ai", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            user:user,
            message:msg
        })
    });

    let data = await res.json();

    addMsg("AI: " + data.reply, "ai");

    document.getElementById("msg").value = "";
}
</script>

</body>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
}

/* CHAT */
#chat{
    height:70vh;
    overflow-y:scroll;
    padding:10px;
}

/* INPUT */
input,button{
    padding:10px;

}

button{

.popup{
    position:fixed;
    top:20px;

<body>

<h2>🔥 NAHI FOND AI + CHAT</h2>

<div id="chat"></div>

<input id="to" placeholder="user">
<input id="msg" placeholder="message">

<button onclick="send()">Send</button>

<br>

<!-- VOICE BUTTON -->
<button onclick="startVoice()">🎤 Talk to AI</button>

<div id="popup" class="popup"></div>

<script>
const socket = io();
let user = prompt("Enter username");

socket.emit("join",{user});

/* USER CHAT */
function send(){
    socket.emit("message",{
        from:user,
        to:document.getElementById("to").value,
        message:document.getElementById("msg").value
    });
}

/* RECEIVE CHAT */
socket.on("private_message",(data)=>{
    document.getElementById("chat").innerHTML +=
    `<p><b>${data.from}:</b> ${data.message}</p>`;

    showPopup(data.from + ": " + data.message);
});

/* POPUP */
function showPopup(text){
    let p = document.getElementById("popup");
    p.innerText = text;
    p.style.display = "block";

    setTimeout(()=>p.style.display="none",3000);
}

//
// 🎤 VOICE AI SYSTEM
//

function startVoice(){

    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    recognition.start();

    recognition.onresult = async function(event){

        let text = event.results[0][0].transcript;

        // show user speech
        document.getElementById("chat").innerHTML +=
        `<p><b>You (voice):</b> ${text}</p>`;

        // send to AI backend
        let res = await fetch("/ai",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({text})
        });

        let data = await res.json();

        // show AI reply
        document.getElementById("chat").innerHTML +=
        `<p><b>AI:</b> ${data.reply}</p>`;

        // 🔊 AI VOICE OUTPUT
        let speech = new SpeechSynthesisUtterance(data.reply);
        speechSynthesis.speak(speech);
    }
}
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
}

#chat{
    height:60vh;
    overflow-y:scroll;
    padding:10px;
}

input,button{
    padding:10px;
    margin:5px;
}

button{
    background:red;
    border:none;
}

.fileBox{
    border:1px solid red;
    padding:10px;
    margin:5px;
}
</style>
</head>

<body>

<h2>🔥 NAHI FOND FILE SHARE + AI</h2>

<div id="chat"></div>

<!-- DM -->
<input id="receiver" placeholder="send to user">
<input id="msg" placeholder="message">
<button onclick="send()">Send</button>

<br><br>

<!-- FILE -->
<input type="file" id="file">
<button onclick="upload()">Upload & Send</button>

<br><br>

<!-- AI ANALYZE -->
<button onclick="analyzeFile()">🤖 AI Analyze Text</button>

<script>
const socket = io();
let user = prompt("Enter username");

socket.emit("join",{user});

/* DM MESSAGE */
function send(){
    socket.emit("message",{
        from:user,
        to:document.getElementById("receiver").value,
        message:document.getElementById("msg").value
    });
}

/* FILE UPLOAD */
async function upload(){

    let file = document.getElementById("file").files[0];
    let receiver = document.getElementById("receiver").value;

    let form = new FormData();
    form.append("file",file);
    form.append("sender",user);
    form.append("receiver",receiver);

    await fetch("/upload",{
        method:"POST",
        body:form
    });

    alert("File sent 🚀");
}

/* AI ANALYZE */
async function analyzeFile(){

    let text = prompt("Paste file text for AI analysis");

    let res = await fetch("/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data = await res.json();

    alert("AI: " + data.ai);
}

/* RECEIVE FILE */
socket.on("file_received",(data)=>{
    document.getElementById("chat").innerHTML +=
    `<div class="fileBox">
        📁 File from <b>${data.from}</b>: ${data.filename}
    </div>`;
});
</script>

</body>
</html>
